<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Timezone App</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #121212; 
            color: #e0e0e0;
        }
        .container { 
            background: #1e1e1e; 
            padding: 3rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }
        .city-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        h1 { font-size: 3.5rem; margin: 0.5rem 0; color: #bb86fc; letter-spacing: -1px; }
        select { 
            padding: 0.8rem; 
            font-size: 1rem; 
            margin-top: 1.5rem; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2c2c2c; 
            color: #fff;
            width: 100%;
            cursor: pointer;
        }
        .date { font-size: 1.1rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <img id="city-img" class="city-image" src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=400&q=80" alt="City">
        <div class="date" id="date"></div>
        <h1 id="time">00:00:00</h1>
        <select id="timezone">
            <option value="UTC" data-img="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=400&q=80">UTC (Global)</option>
            <option value="Asia/Tokyo" data-img="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=400&q=80">Asia/Tokyo</option>
            <option value="America/New_York" data-img="https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?auto=format&fit=crop&w=400&q=80">America/New_York</option>
            <option value="Europe/London" data-img="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=400&q=80">Europe/London</option>
            <option value="America/Sao_Paulo" data-img="https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&w=400&q=80">America/Sao_Paulo</option>
            <option value="Australia/Sydney" data-img="https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&w=400&q=80">Australia/Sydney</option>
        </select>
    </div>
    <script>
        const timeDisplay = document.getElementById('time');
        const dateDisplay = document.getElementById('date');
        const timezoneSelect = document.getElementById('timezone');
        const cityImg = document.getElementById('city-img');

        function updateTime() {
            const now = new Date();
            const selectedOption = timezoneSelect.options[timezoneSelect.selectedIndex];
            const tz = selectedOption.value;
            
            const timeStr = now.toLocaleTimeString('en-US', { timeZone: tz, hour12: false });
            const dateStr = now.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

            timeDisplay.textContent = timeStr;
            dateDisplay.textContent = dateStr;
            cityImg.src = selectedOption.getAttribute('data-img');
        }

        timezoneSelect.addEventListener('change', updateTime);
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
